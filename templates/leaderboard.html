<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <h1>Top Players</h1>

    <table>
        <tr>
            <th>Player</th>
            <th>Score</th>
            <th>Date</th>
        </tr>

        {% for score in scores %}
        <tr>
            <td>{{ score.player_name }}</td>
            <td>{{ score.score }}</td>
            <td>{{ score.date }}</td>
        </tr>
        {% endfor %}
    </table>

    <br>

    <a href="/">
        <button>Back to Game</button>
    </a>

</body>
</html>
